<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlphaGeorge — Connect 4</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/onnxruntime-web/1.17.0/ort.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Anybody:wght@400;700;900&family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #06080d;
    --surface: #0e1118;
    --surface-2: #141720;
    --border: #1c2030;
    --border-light: #252a3a;
    --board-bg: #0b1a3d;
    --board-rim: #132858;
    --slot-empty: #050c1f;
    --slot-border: #0a1533;
    --red: #e8364f;
    --red-light: #ff4d66;
    --red-glow: rgba(232, 54, 79, 0.4);
    --red-soft: rgba(232, 54, 79, 0.1);
    --gold: #f0c030;
    --gold-light: #ffda55;
    --gold-glow: rgba(240, 192, 48, 0.4);
    --gold-soft: rgba(240, 192, 48, 0.1);
    --text: #e2e5ed;
    --text-dim: #555d75;
    --text-muted: #3a4055;
    --green: #22c55e;
    --green-soft: rgba(34, 197, 94, 0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 25% 15%, rgba(232, 54, 79, 0.05) 0%, transparent 60%),
      radial-gradient(ellipse 70% 50% at 75% 85%, rgba(240, 192, 48, 0.04) 0%, transparent 60%),
      radial-gradient(ellipse 100% 80% at 50% 50%, rgba(11, 26, 61, 0.3) 0%, transparent 70%);
    pointer-events: none;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.01) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.01) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    animation: fadeInUp 0.6s ease-out;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  header {
    text-align: center;
    margin-bottom: 4px;
  }

  .logo-alpha {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .logo-george {
    font-family: 'Anybody', sans-serif;
    font-size: 42px;
    font-weight: 900;
    letter-spacing: -1px;
    background: linear-gradient(135deg, var(--red-light) 0%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  .subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: 6px;
  }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 8px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    font-size: 13px;
    font-weight: 500;
    min-height: 40px;
    backdrop-filter: blur(12px);
  }

  .status-indicator {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--red);
    box-shadow: 0 0 8px var(--red-glow);
    transition: all 0.3s;
  }

  .status-indicator.gold {
    background: var(--gold);
    box-shadow: 0 0 8px var(--gold-glow);
  }

  .status-indicator.active {
    animation: statusPulse 1.2s ease-in-out infinite;
  }

  .status-indicator.neutral {
    background: var(--text-dim);
    box-shadow: none;
    animation: none;
  }

  @keyframes statusPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.4); }
  }

  .status-text { color: var(--text); }

  .model-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 100px;
    background: var(--red-soft);
    border: 1px solid rgba(232, 54, 79, 0.2);
    color: var(--red);
    letter-spacing: 0.5px;
    transition: all 0.3s;
  }

  .model-tag.loaded {
    background: var(--green-soft);
    border-color: rgba(34, 197, 94, 0.25);
    color: var(--green);
  }

  .board-area { position: relative; }

  .column-hints {
    display: grid;
    grid-template-columns: repeat(7, 52px);
    gap: 6px;
    padding: 0 14px;
    height: 28px;
    margin-bottom: 2px;
  }

  .column-hint {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .hint-piece {
    width: 24px; height: 24px;
    border-radius: 50%;
    opacity: 0;
    transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
    transform: translateY(-4px) scale(0.7);
  }

  .hint-piece.show {
    opacity: 0.7;
    transform: translateY(0) scale(1);
  }

  .hint-piece.red { background: var(--red); box-shadow: 0 0 10px var(--red-glow); }
  .hint-piece.gold { background: var(--gold); box-shadow: 0 0 10px var(--gold-glow); }

  .board {
    background: linear-gradient(180deg, var(--board-bg) 0%, #081633 100%);
    border: 2px solid var(--board-rim);
    border-radius: 14px;
    padding: 14px;
    display: grid;
    grid-template-columns: repeat(7, 52px);
    grid-template-rows: repeat(6, 52px);
    gap: 6px;
    box-shadow:
      0 0 0 1px rgba(19, 40, 88, 0.5),
      0 12px 40px rgba(0, 0, 0, 0.5),
      0 2px 8px rgba(0, 0, 0, 0.3),
      inset 0 1px 0 rgba(255, 255, 255, 0.04);
  }

  .slot {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: var(--slot-empty);
    border: 2px solid var(--slot-border);
    cursor: pointer;
    transition: all 0.15s;
  }

  .slot:hover:not(.placed):not(.locked) {
    border-color: rgba(255,255,255,0.12);
    background: #081225;
  }

  .slot.locked { cursor: default; pointer-events: none; }

  .slot.red {
    background: radial-gradient(circle at 35% 35%, var(--red-light), var(--red) 70%);
    border-color: var(--red);
    box-shadow: 0 0 14px var(--red-glow), inset 0 1px 2px rgba(255,255,255,0.2);
    animation: pieceDropIn 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .slot.gold {
    background: radial-gradient(circle at 35% 35%, var(--gold-light), var(--gold) 70%);
    border-color: var(--gold);
    box-shadow: 0 0 14px var(--gold-glow), inset 0 1px 2px rgba(255,255,255,0.25);
    animation: pieceDropIn 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .slot.win-flash { animation: winGlow 0.5s ease-in-out infinite alternate; }
  .slot.red.win-flash { box-shadow: 0 0 20px var(--red-glow), 0 0 40px rgba(232, 54, 79, 0.2); }
  .slot.gold.win-flash { box-shadow: 0 0 20px var(--gold-glow), 0 0 40px rgba(240, 192, 48, 0.2); }

  @keyframes pieceDropIn {
    0% { transform: translateY(-60px); opacity: 0.3; }
    50% { transform: translateY(3px); }
    100% { transform: translateY(0); opacity: 1; }
  }

  @keyframes winGlow {
    0% { transform: scale(1); filter: brightness(1); }
    100% { transform: scale(1.06); filter: brightness(1.2); }
  }

  .policy-viz {
    display: grid;
    grid-template-columns: repeat(7, 52px);
    gap: 6px;
    padding: 0 14px;
    margin-top: 8px;
    height: 36px;
  }

  .policy-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    gap: 2px;
  }

  .policy-bar {
    width: 100%;
    border-radius: 2px 2px 0 0;
    background: linear-gradient(180deg, rgba(240, 192, 48, 0.35), rgba(240, 192, 48, 0.15));
    transition: height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    min-height: 0;
  }

  .policy-pct {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    font-weight: 600;
    color: var(--text-muted);
    transition: color 0.3s;
  }

  .policy-pct.highlight { color: var(--gold); }

  .scoreboard {
    display: flex;
    gap: 32px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }

  .score-entry {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-dim);
  }

  .score-pip {
    width: 6px; height: 6px;
    border-radius: 50%;
  }

  .score-pip.red { background: var(--red); }
  .score-pip.gold { background: var(--gold); }
  .score-pip.grey { background: var(--text-dim); }

  .score-val {
    color: var(--text);
    font-weight: 600;
    font-size: 15px;
  }

  .thinking-anim {
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }

  .thinking-anim .dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--gold);
    animation: dotBounce 0.9s ease-in-out infinite;
  }

  .thinking-anim .dot:nth-child(2) { animation-delay: 0.12s; }
  .thinking-anim .dot:nth-child(3) { animation-delay: 0.24s; }

  @keyframes dotBounce {
    0%, 70%, 100% { transform: translateY(0); opacity: 0.3; }
    35% { transform: translateY(-5px); opacity: 1; }
  }

  .controls { display: flex; gap: 10px; }

  .btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    padding: 9px 22px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn:hover {
    border-color: var(--border-light);
    color: var(--text);
    background: var(--surface-2);
  }

  .file-btn { position: relative; overflow: hidden; }

  .file-btn input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
  }

  .info {
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
    max-width: 440px;
    line-height: 1.7;
  }

  .info code {
    font-family: 'JetBrains Mono', monospace;
    background: var(--surface);
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 10px;
    border: 1px solid var(--border);
    color: var(--text-dim);
  }
</style>
</head>
<body>

<div class="container">

  <header>
    <span class="logo-alpha">Alpha</span>
    <div class="logo-george">George</div>
    <div class="subtitle">neural network &middot; connect four</div>
  </header>

  <div class="status-bar">
    <div class="status-indicator active" id="statusDot"></div>
    <span class="status-text" id="statusText">Your turn</span>
    <span class="model-tag" id="modelTag">NO MODEL</span>
  </div>

  <div class="board-area">
    <div class="column-hints" id="colHints"></div>
    <div class="board" id="board"></div>
    <div class="policy-viz" id="policyViz"></div>
  </div>

  <div class="scoreboard">
    <div class="score-entry"><div class="score-pip red"></div> You <span class="score-val" id="sYou">0</span></div>
    <div class="score-entry"><div class="score-pip grey"></div> Draw <span class="score-val" id="sDraw">0</span></div>
    <div class="score-entry"><div class="score-pip gold"></div> AI <span class="score-val" id="sAI">0</span></div>
  </div>

  <div class="controls">
    <button class="btn" onclick="resetGame()">New Game</button>
    <button class="btn" id="switchBtn" onclick="toggleFirstPlayer()">You: 1st</button>
  </div>

  <p class="info">
    AlphaGeorge is a neural network trained via self-play using AlphaZero-style
    reinforcement learning. Think you can beat it?
  </p>

</div>

<script>
// Disable WASM multi-threading to avoid cross-origin isolation issues
ort.env.wasm.numThreads = 1;

const ROWS = 6, COLS = 7;
const HUMAN = 1, AI = -1;

let grid = [];
let turn = HUMAN;
let over = false;
let session = null;
let scores = { you: 0, ai: 0, draw: 0 };
let lastPolicy = null;

function makeGrid() {
  grid = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
}

function render() {
  const el = document.getElementById('board');
  el.innerHTML = '';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const s = document.createElement('div');
      s.className = 'slot';
      if (grid[r][c] === HUMAN) s.classList.add('red', 'placed');
      else if (grid[r][c] === AI) s.classList.add('gold', 'placed');
      if (over || turn !== HUMAN) s.classList.add('locked');
      s.addEventListener('click', () => humanDrop(c));
      s.addEventListener('mouseenter', () => hintShow(c));
      s.addEventListener('mouseleave', hintHide);
      el.appendChild(s);
    }
  }
}

function buildHints() {
  const el = document.getElementById('colHints');
  el.innerHTML = '';
  for (let c = 0; c < COLS; c++) {
    const wrap = document.createElement('div');
    wrap.className = 'column-hint';
    const p = document.createElement('div');
    p.className = 'hint-piece red';
    p.id = `hint-${c}`;
    wrap.appendChild(p);
    el.appendChild(wrap);
  }
}

function buildPolicyViz() {
  const el = document.getElementById('policyViz');
  el.innerHTML = '';
  for (let c = 0; c < COLS; c++) {
    const col = document.createElement('div');
    col.className = 'policy-col';
    const bar = document.createElement('div');
    bar.className = 'policy-bar';
    bar.id = `pbar-${c}`;
    bar.style.height = '0px';
    const pct = document.createElement('div');
    pct.className = 'policy-pct';
    pct.id = `ppct-${c}`;
    pct.textContent = '';
    col.appendChild(bar);
    col.appendChild(pct);
    el.appendChild(col);
  }
}

function showPolicy(policy) {
  if (!policy) {
    for (let c = 0; c < COLS; c++) {
      document.getElementById(`pbar-${c}`).style.height = '0px';
      document.getElementById(`ppct-${c}`).textContent = '';
      document.getElementById(`ppct-${c}`).classList.remove('highlight');
    }
    return;
  }
  const mx = Math.max(...policy);
  for (let c = 0; c < COLS; c++) {
    const h = mx > 0 ? (policy[c] / mx) * 22 : 0;
    document.getElementById(`pbar-${c}`).style.height = h + 'px';
    const pctEl = document.getElementById(`ppct-${c}`);
    pctEl.textContent = (policy[c] * 100).toFixed(0) + '%';
    pctEl.classList.toggle('highlight', policy[c] === mx && mx > 0);
  }
}

function hintShow(c) {
  if (over || turn !== HUMAN) return;
  for (let i = 0; i < COLS; i++) {
    const el = document.getElementById(`hint-${i}`);
    el.classList.toggle('show', i === c && dropRow(c) !== -1);
  }
}

function hintHide() {
  for (let i = 0; i < COLS; i++)
    document.getElementById(`hint-${i}`).classList.remove('show');
}

function dropRow(col) {
  for (let r = ROWS - 1; r >= 0; r--)
    if (grid[r][col] === 0) return r;
  return -1;
}

function drop(col, player) {
  const r = dropRow(col);
  if (r === -1) return -1;
  grid[r][col] = player;
  return r;
}

function checkWin(player) {
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (grid[r][c] !== player) continue;
      for (const [dr, dc] of dirs) {
        let cells = [[r, c]];
        for (let k = 1; k < 4; k++) {
          const nr = r + dr*k, nc = c + dc*k;
          if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS || grid[nr][nc] !== player) break;
          cells.push([nr, nc]);
        }
        if (cells.length === 4) return { won: true, cells };
      }
    }
  }
  return { won: false, cells: [] };
}

function boardFull() {
  return grid[0].every(v => v !== 0);
}

function validCols() {
  return [...Array(COLS).keys()].filter(c => dropRow(c) !== -1);
}

function encodeBoard(grid, player) {
  const data = new Float32Array(3 * ROWS * COLS);
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const idx = r * COLS + c;
      const v = grid[r][c] * player;
      if (v === -1) data[idx] = 1;
      else if (v === 0) data[ROWS * COLS + idx] = 1;
      else if (v === 1) data[2 * ROWS * COLS + idx] = 1;
    }
  }
  return data;
}

function softmax(arr) {
  const mx = Math.max(...arr);
  const ex = arr.map(x => Math.exp(x - mx));
  const s = ex.reduce((a, b) => a + b, 0);
  return ex.map(x => x / s);
}

async function aiTurn() {
  setStatus('AlphaGeorge thinking', 'gold', true);
  await new Promise(r => setTimeout(r, 250));

  const vc = validCols();
  let col, policy = null;

  if (session) {
    try {
      const enc = encodeBoard(grid, AI);
      const tensor = new ort.Tensor('float32', enc, [1, 3, ROWS, COLS]);
      const res = await session.run({ board: tensor });
      const pOut = res.policy || res.output_0 || Object.values(res)[0];
      const logits = Array.from(pOut.data).slice(0, COLS);
      const masked = logits.map((l, i) => vc.includes(i) ? l : -Infinity);
      policy = softmax(masked);
      col = policy.indexOf(Math.max(...policy));
    } catch (e) {
      console.error('Inference error:', e);
      col = vc[Math.floor(Math.random() * vc.length)];
    }
  } else {
    col = vc[Math.floor(Math.random() * vc.length)];
  }

  lastPolicy = policy;
  showPolicy(policy);
  drop(col, AI);
  render();

  const res = checkWin(AI);
  if (res.won) {
    flashWin(res.cells);
    scores.ai++;
    updateScores();
    setStatus('AlphaGeorge wins', 'gold', false);
    over = true;
    return;
  }
  if (boardFull()) {
    scores.draw++;
    updateScores();
    setStatus('Draw', 'neutral', false);
    over = true;
    return;
  }

  turn = HUMAN;
  setStatus('Your turn', 'red', false);
  render();
}

function humanDrop(col) {
  if (over || turn !== HUMAN || dropRow(col) === -1) return;

  drop(col, HUMAN);
  showPolicy(null);
  render();

  const res = checkWin(HUMAN);
  if (res.won) {
    flashWin(res.cells);
    scores.you++;
    updateScores();
    setStatus('You win!', 'red', false);
    over = true;
    return;
  }
  if (boardFull()) {
    scores.draw++;
    updateScores();
    setStatus('Draw', 'neutral', false);
    over = true;
    return;
  }

  turn = AI;
  render();
  hintHide();
  setTimeout(aiTurn, 80);
}

function flashWin(cells) {
  const boardEl = document.getElementById('board');
  for (const [r, c] of cells)
    boardEl.children[r * COLS + c].classList.add('win-flash');
}

function setStatus(text, type, thinking) {
  const dot = document.getElementById('statusDot');
  dot.className = 'status-indicator';
  if (type === 'gold') dot.classList.add('gold', 'active');
  else if (type === 'neutral') dot.classList.add('neutral');
  else dot.classList.add('active');

  const txt = document.getElementById('statusText');
  if (thinking) {
    txt.innerHTML = `${text} <span class="thinking-anim"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>`;
  } else {
    txt.textContent = text;
  }
}

function updateScores() {
  document.getElementById('sYou').textContent = scores.you;
  document.getElementById('sAI').textContent = scores.ai;
  document.getElementById('sDraw').textContent = scores.draw;
}

async function loadModel() {
  const tag = document.getElementById('modelTag');
  tag.textContent = 'LOADING';
  tag.className = 'model-tag';
  setStatus('Loading AlphaGeorge...', 'neutral', true);

  try {
    const response = await fetch('connect4.onnx');
    const buf = await response.arrayBuffer();
    session = await ort.InferenceSession.create(buf);
    tag.textContent = 'MODEL OK';
    tag.className = 'model-tag loaded';
    console.log('Model loaded — inputs:', session.inputNames, 'outputs:', session.outputNames);
    setStatus('Your turn', 'red', false);
  } catch (e) {
    console.error('Load failed:', e);
    tag.textContent = 'FAILED';
    setStatus('Model failed to load — AI plays randomly', 'neutral', false);
    session = null;
  }
}

let humanGoesFirst = true;

function toggleFirstPlayer() {
  humanGoesFirst = !humanGoesFirst;
  document.getElementById('switchBtn').textContent = humanGoesFirst ? 'You: 1st' : 'You: 2nd';
  resetGame();
}

function resetGame() {
  over = false;
  lastPolicy = null;
  makeGrid();

  if (humanGoesFirst) {
    turn = HUMAN;
    render();
    showPolicy(null);
    setStatus('Your turn', 'red', false);
  } else {
    turn = AI;
    render();
    showPolicy(null);
    setStatus('AlphaGeorge thinking', 'gold', true);
    setTimeout(aiTurn, 100);
  }
}

makeGrid();
render();
buildHints();
buildPolicyViz();
loadModel();
</script>
</body>
</html>
